<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospo — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FAF8F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 88px; height: 88px;
      border-radius: 24px;
      background: #C17C5E;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 32px rgba(193,124,94,0.3);
    }
    .icon svg { width: 52px; height: 52px; }
    h1 {
      font-family: Georgia, 'Crimson Pro', serif;
      font-size: 2rem; font-weight: 300;
      color: #705D56; margin-bottom: 12px;
    }
    p {
      color: #A67C6D; font-size: 1rem;
      line-height: 1.6; max-width: 280px;
      margin: 0 auto 36px;
    }
    button {
      background: #C17C5E; color: white;
      border: none; padding: 15px 40px;
      border-radius: 100px; font-size: 1rem;
      cursor: pointer; letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(193,124,94,0.35);
    }
    button:active { transform: scale(0.97); }
    .dots { display: flex; gap: 8px; justify-content: center; margin-top: 44px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #C17C5E; animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%,80%,100% { opacity:.25; transform:scale(1); }
      40% { opacity:1; transform:scale(1.35); }
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="9" y="14" width="26" height="22" rx="4" fill="white" opacity="0.92"/>
      <path d="M35,19 A7,7 0 0,1 35,31" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.92"/>
      <line x1="16" y1="20" x2="16" y2="30" stroke="#C17C5E" stroke-width="3" stroke-linecap="round"/>
      <line x1="28" y1="20" x2="28" y2="30" stroke="#C17C5E" stroke-width="3" stroke-linecap="round"/>
      <line x1="16" y1="25" x2="28" y2="25" stroke="#C17C5E" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="22" cy="37" rx="13" ry="2.5" fill="white" opacity="0.55"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>Hospo needs a connection to show the latest shifts and jobs. Check your Wi‑Fi or mobile data and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</body>
</html>
